<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Marta Caires</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
    <main class="container">
        <section class="login-card">
            <div class="login-header">
                <h1>Login Administrador</h1>
                <p>Acesso exclusivo para o administrador. Faça login para ver, editar e excluir os agendamentos dos clientes.</p>
            </div>
            <form id="loginForm" class="form-grid">
                <div class="form-group">
                    <label class="form-label" for="username">Usuário</label>
                    <input type="text" id="username" class="form-input" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Senha</label>
                    <input type="password" id="password" class="form-input" autocomplete="current-password" required>
                </div>
                <button type="submit" class="form-submit">Entrar</button>
            </form>
            <div id="loginMessage" class="message-box" style="display:none;"></div>
            <p class="login-note">Usuário padrão: <strong>admin</strong> / Senha padrão: <strong>admin123</strong></p>
            <div class="login-footer">
                <a href="index.html" class="cta-secondary">Voltar para a página inicial</a>
            </div>
        </section>
    </main>
    <script src="js/login.js"></script>
</body>
</html>
