<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Agendamentos - Marta Caires</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="page-header">
        <div class="page-header-top">
            <h1 class="page-title">Agende sua sessão</h1>
            <a href="index.html" class="btn btn-primary">Voltar para início</a>
        </div>
        <p class="admin-note">Escolha a data, o horário e o tipo de massagem. Informe seus dados para solicitar o agendamento.</p>
    </header>

    <div class="container">
        <section class="content-section section-card agendamento-section active">
            <h2 class="section-title">Agendar Sessão</h2>
            <form id="formAgendamento" class="form-grid">
                <input type="hidden" id="agendamento_id">
                <div class="form-group">
                    <label class="form-label" for="data">Data</label>
                    <input type="date" id="data" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="hora">Hora</label>
                    <input type="time" id="hora" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="tipo_massagem">Tipo de Massagem</label>
                    <select id="tipo_massagem" class="form-select" required>
                        <option value="">Carregando serviços...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" for="cliente_nome">Nome completo</label>
                    <input type="text" id="cliente_nome" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="cliente_telefone">Telefone</label>
                    <input type="tel" id="cliente_telefone" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="cliente_email">Email</label>
                    <input type="email" id="cliente_email" class="form-input">
                </div>
                <div class="form-group form-span-2">
                    <label class="form-label" for="observacoes">Observações</label>
                    <textarea id="observacoes" class="form-textarea" placeholder="Preferências ou necessidades especiais"></textarea>
                </div>
                <div class="form-row">
                    <div></div>
                    <button type="submit" class="form-submit">Agendar</button>
                    <button type="button" id="cancelEdit" class="btn btn-secondary">Cancelar</button>
                </div>
            </form>

            <h2 class="section-title">Agendamentos</h2>
            <table id="listaAgendamentos" class="data-table">
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Hora</th>
                        <th>Massagem</th>
                        <th>Cliente</th>
                        <th>Email</th>
                        <th>Observações</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>
    </div>

    <div id="messageBox" class="message-box" style="display:none;"></div>
    <script src="js/agendamentos.js"></script>
</body>
</html>
