<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agendamentos - Marta Caires</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --gold-light: #F8E8C8;
            --gold-medium: #D4AF37;
            --gold-dark: #B8860B;
            --cream: #FDF6E3;
            --beige: #F5F0E1;
            --text-dark: #5D4E3A;
            --text-light: #8B7D5F;
            --shadow-gold: 0 12px 40px rgba(212, 175, 55, 0.25);
            --radius: 20px;
            --transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        body {
            background: linear-gradient(135deg, var(--cream) 0%, var(--beige) 100%);
            padding: 2rem 0;
            min-height: 100vh;
        }

        .page-header {
            text-align: center;
            padding: 2rem 0 1rem;
            background: rgba(253, 246, 227, 0.9);
            backdrop-filter: blur(20px);
            box-shadow: var(--shadow-gold);
            border-radius: 0 0 var(--radius) var(--radius);
            margin-bottom: 2rem;
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 5vw, 2.5rem);
            background: linear-gradient(135deg, var(--gold-dark), var(--gold-medium));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .page-tabs {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1rem;
        }

        .tab-button {
            padding: 12px 24px;
            background: rgba(212, 175, 55, 0.15);
            border: 2px solid rgba(212, 175, 55, 0.3);
            border-radius: 50px;
            font-weight: 500;
            color: var(--text-dark);
            text-decoration: none;
            transition: var(--transition);
            position: relative;
        }

        .tab-button.active, .tab-button:hover {
            background: var(--gold-medium);
            color: white;
            box-shadow: var(--shadow-gold);
            transform: translateY(-2px);
        }

        .content-section {
            max-width: 1000px;
            margin: 0 auto 3rem;
            padding: 0 1.5rem;
        }

        .section-card {
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow-gold);
            padding: 2.5rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(212, 175, 55, 0.15);
            position: relative;
            overflow: hidden;
        }

        .section-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--gold-light), var(--gold-medium), var(--gold-dark));
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.75rem;
            color: var(--text-dark);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .section-title::before {
            content: '✦';
            font-size: 1.5rem;
        }

        /* Forms */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-label {
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
        }

        .form-input, .form-select, .form-textarea {
            padding: 14px 18px;
            border: 2px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.9);
            transition: var(--transition);
            font-family: inherit;
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--gold-medium);
            box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.15);
            background: white;
        }

        .form-textarea {
            min-height: 80px;
            resize: vertical;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 1rem;
            align-items: end;
        }

        .form-submit {
            background: linear-gradient(135deg, var(--gold-medium), var(--gold-dark));
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: var(--shadow-gold);
            transition: var(--transition);
        }

        .form-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 16px 40px rgba(212, 175, 55, 0.4);
        }

        /* Tables */
        .data-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            background: white;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow-gold);
            margin-top: 1.5rem;
        }

        .data-table thead th {
            background: linear-gradient(135deg, var(--gold-medium), var(--gold-dark));
            color: white;
            padding: 18px 16px;
            text-align: left;
            font-weight: 600;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .data-table td {
            padding: 18px 16px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }

        .data-table tr:hover {
            background: rgba(212, 175, 55, 0.05);
        }

        .data-table tr:last-child td {
            border-bottom: none;
        }

        .action-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
        }

        .btn-primary {
            background: var(--gold-medium);
            color: white;
        }

        .btn-danger {
            background: #EF5B5B;
            color: white;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-gold);
        }

        /* New Client Fields */
        #novocliente-fields {
            background: rgba(212, 175, 55, 0.05);
            padding: 1.5rem;
            border-radius: 12px;
            border-left: 4px solid var(--gold-medium);
            margin: 1rem 0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .data-table {
                font-size: 0.9rem;
            }

            .data-table thead, .data-table tbody, .data-table th, .data-table td, .data-table tr {
                display: block;
            }

            .data-table thead tr {
                position: absolute;
                top: -9999px;
                left: -9999px;
            }

            .data-table tr {
                border: 1px solid rgba(212, 175, 55, 0.2);
                margin-bottom: 1rem;
                border-radius: 12px;
                padding: 1rem;
            }

            .data-table td {
                border: none;
                position: relative;
                padding-left: 50%;
                padding-top: 12px;
                padding-bottom: 12px;
            }

            .data-table td:before {
                content: attr(data-label) ': ';
                position: absolute;
                left: 16px;
                width: 45%;
                font-weight: 600;
                color: var(--gold-dark);
            }

            .action-buttons {
                justify-content: center;
                margin-top: 1rem;
            }
        }

        /* Loading */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(212, 175, 55, 0.3);
            border-radius: 50%;
            border-top-color: var(--gold-medium);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <header class="page-header">
        <h1 class="page-title">Agendamentos & Clientes</h1>
        <div class="page-tabs">
            <a href="#clientes" class="tab-button active" onclick="showTab('clientes')">👥 Clientes</a>
            <a href="#agendamentos" class="tab-button" onclick="showTab('agendamentos')">📅 Agendamentos</a>
        </div>
    </header>

    <div class="container">
        <!-- Clientes Section -->
        <section id="clientes" class="content-section section-card clientes-section">
            <h2 class="section-title">Gerenciar Clientes</h2>
            <form id="formCliente" class="form-grid">
                <div class="form-group">
                    <label class="form-label" for="nome">Nome Completo</label>
                    <input type="text" id="nome" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="telefone">Telefone</label>
                    <input type="tel" id="telefone" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" class="form-input">
                </div>
                <div class="form-row">
                    <div></div>
                    <button type="submit" class="form-submit">
                        ➕ Adicionar Cliente
                    </button>
                </div>
            </form>
            
            <table id="listaClientes" class="data-table">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Telefone</th>
                        <th>Email</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>

        <!-- Agendamentos Section -->
        <section id="agendamentos" class="content-section section-card agendamento-section" style="display: none;">
            <h2 class="section-title">Novo Agendamento</h2>
            <form id="formAgendamento" class="form-grid">
                <div class="form-group">
                    <label class="form-label" for="data">Data</label>
                    <input type="date" id="data" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="hora">Hora</label>
                    <input type="time" id="hora" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="tipo_massagem">Tipo de Massagem</label>
                    <select id="tipo_massagem" class="form-select" required>
                        <option value="">Selecione...</option>
                        <option value="relaxante">Relaxante (60min) - R$120</option>
                        <option value="shiatsu">Shiatsu (50min) - R$110</option>
                        <option value="deep_tissue">Deep Tissue (75min) - R$150</option>
                        <option value="hot_stone">Pedras Quentes (60min) - R$140</option>
                        <option value="ayurvedica">Aromaterapia (70min) - R$130</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" for="cliente_select">Cliente</label>
                    <select id="cliente_select" class="form-select" required>
                        <option value="">Carregando clientes...</option>
                        <option value="new">➕ Novo Cliente</option>
                    </select>
                </div>
                <div class="form-group" id="novocliente-fields" style="display: none;">
                    <label class="form-label" for="cliente_nome">Nome do Cliente</label>
                    <input type="text" id="cliente_nome" class="form-input" required>
                </div>
                <div class="form-group" id="cliente_email_group" style="display: none;">
                    <label class="form-label" for="cliente_email">Email</label>
                    <input type="email" id="cliente_email" class="form-input">
                </div>
                <div class="form-group" id="cliente_telefone_group" style="display: none;">
                    <label class="form-label" for="cliente_telefone">Telefone</label>
                    <input type="tel" id="cliente_telefone" class="form-input">
                </div>
                <div class="form-group form-span-2">
                    <label class="form-label" for="observacoes">Observações</label>
                    <textarea id="observacoes" class="form-textarea" placeholder="Informações importantes, preferências..."></textarea>
                </div>
                <div class="form-row">
                    <div></div>
                    <button type="submit" class="form-submit">
                        📅 Confirmar Agendamento
                    </button>
                </div>
            </form>

            <table id="listaAgendamentos" class="data-table">
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Hora</th>
                        <th>Massagem</th>
                        <th>Cliente</th>
                        <th>Email</th>
                        <th>Observações</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>
    </div>

    <script src="js/clientes.js"></script>
    <script src="js/agendamentos.js"></script>
    <script>
        function showTab(tab) {
            document.querySelectorAll('.content-section').forEach(section => {
                section.style.display = 'none';
            });
            document.getElementById(tab).style.display = 'block';
            
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
