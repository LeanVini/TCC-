<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
<title>Clientes - Marta Caires</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navegação -->
    <nav class="nav-container" style="display: flex; justify-content: center; gap: 20px; padding: 20px; background: var(--surface); box-shadow: var(--shadow); margin-bottom: 20px;">
        <a href="index.html">Início</a>
        <a href="agendamentos.html" class="nav-active">Agendamentos</a>
        <a href="clientes.html" style="font-weight: bold; color: var(--primary);">Clientes</a>
    </nav>

    <div class="container">
        <h1>Clientes</h1>
        
        <!-- Search -->
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Buscar por nome ou telefone..." style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border);">
        </div>

        <!-- Form Adicionar/Editar -->
        <form id="formCliente" style="display: none;">
            <input type="hidden" id="editId">
            <input type="text" id="nome" placeholder="Nome completo *" required maxlength="100">
            <input type="tel" id="telefone" placeholder="Telefone *" required maxlength="20">
            <input type="email" id="email" placeholder="Email (opcional)" maxlength="100">
            <textarea id="observacoes" placeholder="Observações" maxlength="1000"></textarea>
            <div style="display: flex; gap: 10px;">
                <button type="submit">Salvar</button>
                <button type="button" id="cancelEdit">Cancelar</button>
            </div>
        </form>

        <!-- Loading & Messages -->
        <div id="loading" style="display: none; text-align: center; padding: 20px;">Carregando clientes...</div>
        <div id="errorMsg" style="display: none; color: var(--danger); padding: 10px; background: rgba(197,50,50,0.1); border-radius: 8px;"></div>

        <!-- Tabela -->
        <table id="listaClientes" style="display: none;">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Telefone</th>
                    <th>Email</th>
                    <th>Observações</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <div id="emptyState" style="display: none; text-align: center; padding: 40px; opacity: 0.7;">
            <h3>Nenhum cliente cadastrado</h3>
            <p>Adicione o primeiro cliente usando o formulário acima.</p>
        </div>
    </div>

    <!-- Modal Overlay (para mobile/edit) -->
    <div id="editModal" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
        <div style="background: var(--surface); padding: 24px; border-radius: var(--radius); max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; box-shadow: var(--shadow);">
            <h3 id="modalTitle">Editar Cliente</h3>
            <form id="modalForm">
                <!-- Form fields same as main form, but for modal -->
                <input type="hidden" id="modalEditId">
                <input type="text" id="modalNome" placeholder="Nome *" required>
                <input type="tel" id="modalTelefone" placeholder="Telefone *" required>
                <input type="email" id="modalEmail" placeholder="Email">
                <textarea id="modalObservacoes" placeholder="Observações"></textarea>
                <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
                    <button type="submit">Salvar</button>
                    <button type="button" id="closeModal">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/clientes.js"></script>
</body>
</html>
