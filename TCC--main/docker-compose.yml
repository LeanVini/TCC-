version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: agenda-massagem-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: agenda_massagem
    ports:
      - "3307:3306"  # Expor em 3307 para não conflitar com local MySQL
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d  # Auto-executa schema.sql no init
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build: ./backend
    container_name: agenda-massagem-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app  # Hot reload dev
      - /app/node_modules  # Preservar node_modules
    env_file:
      - ./backend/.env

volumes:
  mysql_data:
